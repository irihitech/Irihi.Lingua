name: Pack to NuGet

on:
  workflow_dispatch:
    inputs:
      Upload_to_NuGet:
        description: 'Upload to NuGet'
        default: true
        type: boolean
      Irihi_Lingua:
        description: 'Pack Irihi.Lingua'
        default: true
        type: boolean
  workflow_call:
    inputs:
      Upload_to_NuGet:
        type: boolean
        default: false
      Irihi_Lingua:
        type: boolean
        default: true
    secrets: {}

jobs:
  Pack_to_NuGet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pack Irihi.Lingua
        if: ${{ inputs.Irihi_Lingua }}
        run: dotnet pack src/Irihi.Lingua.Core -o nugets

      - name: Upload to NuGet
        if: ${{ inputs.Upload_to_NuGet }}
        run: dotnet nuget push "nugets/*.nupkg" --api-key ${{ secrets.NUGET_ORG_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: nugets
          path: nugets
        if: always()
